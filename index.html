  {id:"suap",c:"digitale",n:"SUAP digitale unico 30gg",de:"Sportello unico imprese: 1 domanda, 1 risposta, 30gg max, silenzio-assenso vincolante",co:-.5,sp:"medium",cx:7,cf:"medium",dr:[0,8,0,0,0],sh:[0,-4,3,4,8,5,-1,3],why:"SUAP (Sportello Unico Attività Produttive): tempo medio apertura impresa Roma 280gg, Milano 90gg, Estonia 5gg online. 8.000 SUAP comunali con procedure diverse. Proposta: 1 SUAP digitale nazionale, domanda unica, risposta unica entro 30gg, silenzio-assenso vincolante (se PA non risponde, autorizzazione concessa). Zero passaggi fisici. NZ: registro imprese online in 30 minuti per 0$."},
  {id:"balneari",c:"mef",n:"Gare balneari",de:"Attuazione Bolkestein",co:-1.5,rv:1,sp:"medium",cx:10,cf:"high",dr:[0,3,0,0,0],sh:[1,0,2,2,-5,4,-2,5],why:"Concessioni balneari: 30K stabilimenti su 7.500 km di costa, canoni medi 2.500€/anno (vs valore mercato 50-100K). Rinnovo automatico dal 1993. CGUE 2006 (Promoimpresa): Italia in violazione direttiva Bolkestein. Gare obbligatorie porterebbero: canoni reali (gettito +1.5 Mrd), investimenti privati, accesso nuovi operatori, qualità servizio. Spagna: gare dal 2013, investimenti +40%."},
  {id:"taxi",c:"lavoro",n:"Liberalizzazione taxi/NCC",de:"Nuove licenze",co:-0.5,sp:"medium",cx:12,cf:"high",dr:[0,2,0,0,0],sh:[1,0,4,5,-8,3,-3,4],why:"Roma: 1.8 taxi/1000 ab, tempi attesa 20-45 min. Londra: 4.5/1000, 5 min. NYC: 6.3/1000. Licenze bloccate dal 1994 (valore: 150-200K). Proposta: raddoppio licenze in 3 anni + liberalizzazione NCC + piattaforma unica (modello TfL Londra). Effetto: −50% tempi attesa, +15K posti lavoro, calo prezzi 20%. Compensazione titolari attuali con buy-back graduale su 10 anni."},
  {id:"tribunali",c:"giustizia",n:"Tribunali commerciali",de:"700→150gg",co:.8,sp:"slow",cx:6,cf:"medium",dr:[0,5,0,0,0],sh:[0,2,1,1,4,7,0,5],why:"Tribunali commerciali: Italia non li ha (usa tribunale ordinario). UK Commercial Court: 3 mesi. Singapore International Commercial Court: 6 mesi. Proposta: 20 sezioni specializzate presso tribunali principali, giudici con formazione economica, procedure semplificate per controversie >250K. Effetto: da 700 a 150gg, attrazione investimenti esteri (+2 Mrd/anno stimati da Confindustria)."},
  {id:"zoning",c:"infra",n:"Riforma urbanistica",de:"Piano regolatore nazionale: zone pre-approvate per FER, edilizia, infrastrutture",co:-.5,sp:"slow",cx:8,cf:"medium",dr:[0,5,0,3,0],sh:[-1,-2,1,2,4,5,-1,3],why:"Piano regolatore nazionale per zone idonee: dove si può costruire (FER, infrastrutture, residenziale) e dove no (vincoli ambientali, paesaggistici, sismici). Oggi: ogni Comune ha il suo PRG, 8.000 piani diversi, nessuna coerenza nazionale. Proposta: zonizzazione nazionale digitale con layer sovrapposti (geologia, vincoli, rete, domanda). Aree pre-approvate per FER: autorizzazione in 30gg (non 5 anni). Prerequisito per PNIEC 2030 (80 GW FER)."},
  {id:"professions",c:"lavoro",n:"Ordini professionali",de:"Abolizione esami di stato per 26 ordini, accesso libero con laurea + pratica",co:-1,sp:"medium",cx:10,cf:"medium",dr:[0,5,0,0,0],sh:[0,-1,2,4,-3,4,-2,4],why:"26 ordini professionali con esame di stato obbligatorio: avvocati, commercialisti, ingegneri, architetti, farmacisti, notai, etc. Tariffe 20-40% sopra media EU (OECD). Notai: 4.700 in Italia, compenso medio 250K/anno, accesso limitato da numero chiuso. Proposta: abolizione esame di stato, accesso con laurea + pratica certificata 18m (modello UK solicitors). Mantenere ordini come associazioni volontarie (non barriere all'ingresso). Effetto: −20% costi servizi professionali."},
  {id:"via_express",c:"energia",n:"VIA Express 9 mesi",de:"Autorizzazione impianti FER in 9 mesi max (oggi 5 anni), conferenza servizi unica",co:.5,sp:"medium",cx:14,cf:"medium",dr:[0,7,0,10,0],sh:[-1,-5,2,3,3,7,-3,5],why:"Valutazione Impatto Ambientale: 5 anni in Italia vs 9 mesi in Spagna, 12 mesi in Germania. 40% progetti FER bloccati in VIA. Proposta: procedura unica 9 mesi, conferenza servizi simultanea (non sequenziale), silenzio-assenso per impianti sotto 50 MW in zone idonee. Commissione VIA potenziata con 200 tecnici (oggi 40). Effetto: sblocco 40 GW di rinnovabili in attesa."},
  {id:"fer",c:"energia",n:"Hub FER Mezzogiorno",de:"25 GW fotovoltaico",co:5,sp:"medium",cx:8,cf:"medium",dr:[0,0,0,12,0],sh:[1,1,5,6,3,5,2,3],why:"LCOE fotovoltaico: 25-35 €/MWh (più basso di qualsiasi fonte fossile). Mezzogiorno: irradiazione 1.800 kWh/mq (tra le più alte EU). Proposta: 25 GW fotovoltaico utility-scale, agrivoltaico, sui tetti industriali. Investimento 20 Mrd (privati con PPA). Effetto: PUN −20€/MWh, bolletta famiglie −200€/anno, occupazione 80K posti. Sicilia da sola potrebbe produrre il 30% del fabbisogno nazionale."},
  {id:"accumuli",c:"energia",n:"Accumuli 50 GWh",de:"50 GWh di accumuli elettrochimici per stabilizzare rete FER intermittente",co:2,sp:"medium",cx:5,cf:"medium",dr:[0,0,0,8,0],sh:[1,0,2,3,2,5,1,3],why:"Rinnovabili intermittenti (sole/vento) necessitano accumuli per bilanciare rete. Italia: 1 GWh installato vs 50 GWh necessari (TERNA). Proposta: 50 GWh batterie al litio + 10 GWh pompaggio idroelettrico. Costo: 2 Mrd (in calo 15%/anno). Australia Hornsdale: 150 MW di accumuli hanno ridotto costi bilanciamento del 90%. Effetto: stabilità rete, meno curtailment FER, PUN −10€."},
  {id:"terna",c:"energia",n:"Piano Rete Terna",de:"Trasmissione Nord-Sud",co:3,sp:"slow",cx:6,cf:"high",dr:[0,0,0,7,0],sh:[0,1,1,1,2,5,1,2],why:"Rete trasmissione Nord-Sud sottodimensionata: 3 GW di capacità vs 8 GW necessari. Sud produce rinnovabili ma non riesce a trasportarle al Nord (curtailment 15%). Proposta: Tyrrhenian Link (Sardegna-Sicilia-Campania, 1 GW, già in costruzione), SA.CO.I.3 (Sardegna-Corsica-Italia), raddoppio dorsale adriatica. Investimento: 3 Mrd. Effetto: PUN convergente Nord-Sud (oggi gap 15€/MWh)."},
  {id:"efficienza",c:"energia",n:"Efficienza edifici",de:"Post-Superbonus mirato",co:3,sp:"medium",cx:5,cf:"medium",dr:[0,0,0,5,0],sh:[3,2,5,3,3,2,3,1],why:"75% degli edifici italiani in classe energetica E, F o G (14M edifici). Consumo energetico: 40% del totale nazionale. Superbonus 110% ha speso 120 Mrd ma senza target (ville di lusso incluse). Proposta: bonus 65% mirato a classi E-G, obbligo ristrutturazione per vendita/affitto entro 2035 (direttiva EPBD), cappotto + caldaia + fotovoltaico pacchettizzato. Costo: 3 Mrd/anno. Risparmio energetico: 20% in 10 anni."},
  {id:"smr",c:"energia",n:"SMR nucleare",de:"3 siti, 2034-36",co:1,sp:"slow",cx:8,cf:"exploratory",dr:[0,0,0,3,0],sh:[-2,0,0,2,1,4,-4,3],why:"SMR (Small Modular Reactors, 300 MW): tecnologia modulare, costruibili in fabbrica, siti piccoli (1/10 di reattore tradizionale). 3 siti proposti: Latina (ex centrale), Caorso (ex), Puglia (nuovo). NuScale (USA) e Rolls-Royce (UK) in fase di certificazione. Costo: 1 Mrd per 300 MW. Effetto: 1 GW baseload = copre 8% fabbisogno, PUN stabilizzato. Timeline: 2034-36. Consenso: 45% favorevole (sondaggio SWG 2024)."},
  {id:"idrogeno",c:"energia",n:"Idrogeno verde 3 GW",de:"3 GW elettrolizzatori per decarbonizzare acciaio, chimica, ceramica",co:1,sp:"slow",cx:6,cf:"exploratory",dr:[0,0,0,4,0],sh:[0,0,1,2,1,3,0,2],why:"Idrogeno verde: prodotto da elettrolisi con FER. Mezzogiorno: costo previsto 3-4€/kg entro 2030 (competitivo con H2 grigio a 5-6€). Destinazione: industrie hard-to-abate (acciaio Taranto, ceramica Sassuolo, chimica Porto Marghera). 3 GW di elettrolizzatori = 450K ton H2/anno. Investimento: 1 Mrd pubblico + 3 Mrd privati. Effetto: decarbonizzazione 15% industria pesante, 5K posti lavoro qualificati."},
  {id:"spending",c:"governance",n:"Spending review strutturale",de:"CONSIP obbligatorio + taglio consulenze + cloud unico + immobili + duplicazioni",co:-10,sp:"medium",cx:8,cf:"medium",dr:[0,0,0,0,8],sh:[-2,-6,-1,1,2,4,-5,7],lab:"spend",why:"10 Mrd: (1) CONSIP obbligatorio -3.5 Mrd (18K stazioni appaltanti→3), (2) taglio consulenze -1.5 Mrd (4.7 Mrd/anno, +40% in 5a), (3) immobili PA -2 Mrd (43K immobili, 30% vuoti), (4) cloud unico -1 Mrd (20K data center→3 poli), (5) eliminazione duplicati Stato/Regioni -2 Mrd. Metodo ZBB."},
  {id:"inhouse",c:"governance",n:"Riorg. partecipate",de:"Privatizzazione selettiva: cessione quote non strategiche, mantenere golden power",co:-8,sp:"slow",cx:15,cf:"medium",dr:[0,0,0,0,9],sh:[-1,-7,-2,1,3,5,-6,6],lab:"part",why:"5.600 società partecipate locali e statali: trasporti, acqua, rifiuti, energia, servizi. Costi: 40-50 Mrd/anno. 30% in perdita cronica. Proposta: privatizzazione selettiva quote non strategiche (ENI al 25%, Poste al 35%), golden power su asset strategici. Lab personalizzabile: scegli quali cedere. Incasso stimato: 8-12 Mrd una tantum. Risparmio gestione: 2 Mrd/anno."},
  {id:"centrali",c:"governance",n:"Centrali acquisti",de:"CONSIP obbligatorio",co:-8,sp:"medium",cx:12,cf:"high",dr:[0,0,0,0,10],sh:[0,-3,0,1,-2,4,-2,5],why:"18.000 stazioni appaltanti (ciascun Comune, ASL, ente fa gare in autonomia). Austria: 3. UK: Crown Commercial Service centralizzato. Effetto frammentazione: prezzi 15-40% superiori alla media, corruzione locale, tempi doppi. Proposta: CONSIP obbligatorio per acquisti >50K€, piattaforma digitale unica, catalogo prezzi di riferimento. Risparmio: 8 Mrd/anno (MEF/CONSIP stima conservativa)."},
  {id:"comuni",c:"governance",n:"Accorpamento comuni",de:"Scegli soglia abitanti",co:-2.3,sp:"slow",cx:10,cf:"medium",dr:[0,0,0,0,4],sh:[-3,-4,-2,0,-1,0,-3,2],lab:"comuni",why:"3.356 comuni sotto 2.000 abitanti: 42% dei comuni italiani ma solo 5% della popolazione. Costi fissi (sindaco, segretario, vigile, anagrafe) identici a comuni 10× più grandi. Proposta: fusione obbligatoria sotto soglia (lab personalizzabile). Ogni fusione = 1 sindaco in meno, 1 segretario, 1 sede, 1 sito web. Lab calcola risparmi in tempo reale. Trentino: ha già fuso 50 comuni con successo."},
  {id:"pa_digitale",c:"digitale",n:"PA paperless",de:"100% servizi PA online entro 3 anni, SPID obbligatorio, zero carta",co:1.5,sp:"medium",cx:6,cf:"medium",dr:[5,0,0,0,7],sh:[-2,-3,3,7,4,5,-1,4],why:"Solo 36% servizi PA disponibili online (vs 92% Estonia, 85% Danimarca). Ancora 200M visite/anno agli sportelli fisici (certificati, permessi, iscrizioni). Proposta: 100% servizi online entro 3 anni, SPID/CIE obbligatorio, zero carta. Ogni documento con valore legale digitale. PagoPA per tutti i pagamenti. Estonia: ha risparmiato 2% PIL/anno con e-government completo."},
  {id:"subsidies",c:"mef",n:"Razionalizzazione sussidi",de:"Eliminazione 200+ sussidi senza valutazione impatto (SAD + sociali), risparmio 6 Mrd",co:-6,sp:"medium",cx:10,cf:"medium",dr:[0,0,0,0,5],sh:[-3,-2,-2,1,-4,2,-3,5],why:"40% senza valutazione d'impatto."},
  {id:"agencies",c:"governance",n:"Riorg. enti pubblici",de:"Fusione obbligatoria 8.000 enti con funzioni sovrapposte, target: 800 enti",co:-3,sp:"slow",cx:12,cf:"medium",dr:[0,0,0,0,6],sh:[-1,-5,-1,1,1,2,-4,4],lab:"enti",why:"8.036 enti pubblici (ISTAT 2024): 800 economici + 7.236 non economici. 60% ha meno di 50 dipendenti. Funzioni sovrapposte: 24 enti parco, 60 camere commercio, 22 agenzie, 10 autorità indipendenti, 15 consorzi bonifica. Proposta: fusione obbligatoria sotto soglia 100 dipendenti o 5M budget. Lab personalizzabile per scegliere quali aggregare. Target: 800 enti (−90%). Risparmio: 3 Mrd."},
  {id:"universita",c:"istruzione",n:"Riforma università",de:"30% su placement",co:1,sp:"slow",cx:5,cf:"medium",dr:[5,0,2,0,0],sh:[0,3,2,7,2,3,2,2],why:"Solo 29% laureati trova lavoro coerente con gli studi entro 1 anno (AlmaLaurea). 40% fuori corso. Età media laurea: 27 anni (EU: 23). Proposta: 30% finanziamento universitario legato a tasso placement (occupazione laureati a 12 mesi). Università sotto 50% placement: piano miglioramento obbligatorio. UK TEF (Teaching Excellence Framework): ha migliorato placement del 15% in 5 anni."},
  {id:"brain_drain",c:"istruzione",n:"Stop brain drain",de:"Flat tax 7% per 10 anni ai rientrati + startup visa per talenti stranieri",co:1,sp:"medium",cx:4,cf:"exploratory",dr:[3,0,2,0,0],sh:[0,1,2,8,2,3,1,2],why:"160K italiani emigrati nel 2023 (AIRE), 30% laureati. Destinazioni: UK, DE, CH, USA. Età media: 28 anni. Costo formazione perso: 6 Mrd/anno. Proposta: flat tax 7% per 10 anni sui redditi dei rientrati (già esiste parzialmente, renderla permanente e più generosa) + startup visa per talenti stranieri (Canada: 400K/anno). Effetto: rientro 30K/anno, +10K talenti stranieri. Portogallo NHR: ha attratto 30K professionisti."},
  {id:"ai_hub",c:"istruzione",n:"AI Nation Hub",de:"3 campus AI (Milano, Roma, Napoli), 6K ricercatori, 1 Mrd/anno R&D pubblica",co:3,sp:"medium",cx:5,cf:"exploratory",dr:[10,0,0,0,0],sh:[-1,1,2,6,2,5,0,4],why:"R&D pubblica 0.3% PIL vs 0.7% OECD. 3 campus: Milano (AI/fintech), Roma (cybersecurity/govtech), Napoli (biotech/green). 6K ricercatori reclutati internazionalmente. Corea: KAIST ha trasformato il paese in 20 anni."},
  {id:"teacher_perf",c:"istruzione",n:"Merito docenti",de:"Stipendio docenti +30% legato a valutazione INVALSI e peer review",co:.5,sp:"medium",cx:6,cf:"medium",dr:[2,0,3,0,0],sh:[1,-2,3,5,1,1,4,1],why:"Stipendio docente italiano: 28K lordi/anno (OECD media: 35K). Nessun legame tra performance e retribuzione. Età media: 52 anni. Proposta: +30% stipendio base legato a: (1) risultati INVALSI della classe (40%), (2) peer review colleghi (30%), (3) formazione continua (30%). Singapore: stipendio docente = 130% media nazionale, selezione top 10% laureati. Finlandia: docente è professione prestigiosa → PISA top 5."},
  {id:"cyber",c:"istruzione",n:"Cyber defense",de:"Centro operativo cybersecurity nazionale + 2K specialisti per protezione infrastrutture critiche",co:1,sp:"medium",cx:4,cf:"medium",dr:[3,0,0,0,0],sh:[0,2,0,4,1,3,0,3],why:"2.779 attacchi informatici gravi nel 2023 (+12% vs 2022, Clusit). Target: PA, sanità, energia, trasporti. Costo danni: 2.5 Mrd/anno. Italia: 0 centri operativi di cybersecurity integrati (UK: NCSC dal 2016). Proposta: SOC nazionale + 2K specialisti cyber + formazione obbligatoria PA + bug bounty per infrastrutture critiche. Israele Unit 8200: modello di eccellenza, 10% PIL in cybersecurity/tech."},
  {id:"pensioni",c:"lavoro",n:"Riforma pensioni",de:"Età, sistema a punti",co:-5,sp:"slow",cx:18,cf:"high",dr:[0,0,5,0,0],sh:[-9,-4,2,7,3,5,-8,8],lab:"pens",why:"Spesa pensioni 16% PIL (più alta EU). 16.2M pensionati vs 23.4M lavoratori (ratio 1.44, peggiorerà a 1.2 nel 2045). Proposta: età pensionabile flessibile (63-70) + sistema a punti (ogni anno lavorato = punti, pensione proporzionale). Lab personalizzabile: simula età, sistema misto/contributivo/punti. Modello svedese NDC disponibile come alternativa radicale."},
  {id:"sindacati",c:"lavoro",n:"Riforma CCNL",de:"900→<100 contratti",co:-.5,sp:"slow",cx:16,cf:"medium",dr:[0,3,3,0,0],sh:[0,-5,-2,3,5,6,-9,5],why:"900+ CCNL (contratti collettivi nazionali): molti firmati da sindacati di comodo per abbassare i minimi. DE: ~200 CCNL. Proposta: ridurre a meno di 100 tramite soglia di rappresentatività (sindacati con <5% iscritti nel settore non possono firmare CCNL). Effetto: eliminazione contratti pirata, +15% salari nei settori a bassa sindacalizzazione. Obbligo di minimi tabellari certificati CNEL."},
  {id:"ssn",c:"sanita",n:"SSN +10 Mrd",de:"+10 Mrd SSN: 50K assunzioni, tetto stipendi abolito, liste attesa max 30gg",co:10,sp:"medium",cx:6,cf:"high",dr:[0,0,2,0,0],sh:[9,6,7,5,2,1,7,-3],why:"Spesa sanitaria 6.2% PIL (EU 7.3%, DE 11.5%). Underfunding cronico dal 2010: −37 Mrd cumulati vs trend EU. Liste attesa: 3.6M cittadini, +40% dal 2019. Proposta: +10 Mrd (a 7.2% PIL). Destinazione: 50K assunzioni (medici, infermieri), abolizione tetto stipendi per attrarre specialisti, 30gg max liste attesa (con commissariamento ASL che sforano). Modello: NHS UK Long Term Plan."},
  {id:"difesa",c:"difesa",n:"Difesa 2% PIL",de:"Budget 2% PIL (da 1.5%), 70% speso in industria italiana (Leonardo, Fincantieri)",co:5,sp:"medium",cx:7,cf:"medium",dr:[2,0,0,0,0],sh:[-1,2,-2,-3,2,5,-2,4],why:"Spesa difesa 1.5% PIL vs 2% richiesto NATO (impegno Galles 2014, ribadito Madrid 2022). Gap: 11 Mrd/anno. Proposta: salita graduale a 2% in 5 anni, 70% speso in industria nazionale (Leonardo, Fincantieri, MBDA). Focus: droni (Eurodrone), difesa aerea (SAMP/T), cyber warfare, spazio. Effetto: +35K posti industria difesa, sovranità tecnologica. FR: 2% dal 2025, ha industria difesa export 10 Mrd/anno."},
  {id:"welfare",c:"lavoro",n:"Assegno unico universale",de:"1 assegno unico che sostituisce 20+ bonus frammentati, erogazione automatica",co:-2,sp:"medium",cx:10,cf:"medium",dr:[0,0,3,0,3],sh:[2,-2,5,6,-1,0,3,4],why:"20+ misure di sostegno alle famiglie (bonus bebè, bonus asilo, detrazione figli, assegno nucleo, bonus mamma, carta acquisti...). Ciascuna con requisiti, ISEE, domanda diversi. 40% aventi diritto non richiede per complessità. Proposta: 1 assegno unico universale (esiste dal 2022 ma va potenziato), erogazione automatica senza domanda (incrocio INPS-AE), importo crescente per figlio (1°: 200€, 2°: 300€, 3°+: 400€)."},
  {id:"flat_dual",c:"mef",n:"Flat tax duale",de:"15% autonomi, 23% dipendenti",co:8,sp:"fast",cx:12,cf:"medium",dr:[0,0,3,0,0],sh:[3,1,5,2,-3,-1,2,-2],why:"Riduce aliquota marginale autonomi. Rischio: erosione base imponibile IRPEF. Modello: regime forfettario esteso."},
  {id:"dual_income",c:"mef",n:"Dual income tax",de:"Tassazione separata redditi capitale/lavoro",co:3,sp:"medium",cx:10,cf:"medium",dr:[0,2,2,0,0],sh:[1,1,3,2,2,4,1,3],why:"Raccomandazione OECD. Paesi nordici: aliquota capitale 25-30%, lavoro progressiva. Attrae investimenti."},
  {id:"iva_reform",c:"mef",n:"Riforma aliquote IVA",de:"3 aliquote → 2 (10% e 22%)",co:-4,rv:1,sp:"fast",cx:8,cf:"high",dr:[0,0,0,0,2],sh:[-2,0,-3,0,1,2,-1,5],why:"BdI: semplificazione aliquote + riduzione esenzioni = +4 Mrd gettito. Riduce costi compliance."},
  {id:"naval_block",c:"interno",n:"Blocco navale",de:"Deterrenza marittima + accordi bilaterali",co:2,sp:"medium",cx:16,cf:"exploratory",dr:[0,0,0,0,0],sh:[-2,3,-3,-5,-1,0,-4,2],why:"Costo operativo ~2 Mrd/anno (Marina + Frontex). Efficacia deterrenza: 30-60% riduzione flussi (stima ISPI). Trade-off: costi umanitari, tensioni diplomatiche, accordi con paesi terzi."},
  {id:"deport_accel",c:"interno",n:"Rimpatri accelerati",de:"CPR + accordi bilaterali",co:1.5,sp:"slow",cx:14,cf:"exploratory",dr:[0,0,0,0,0],sh:[-3,3,-2,-6,-1,0,-5,1],why:"Tasso rimpatrio attuale: 11% (EU media 29%). Costo per rimpatrio: ~5K€. Limiti: accordi bilaterali (Tunisia, Egitto), capacità CPR (1.500 posti vs 90K irregolari/anno)."},
  {id:"migr_quota",c:"lavoro",n:"Quote migratorie selettive",de:"Sistema a punti (skills, lingua, età)",co:-0.5,sp:"medium",cx:8,cf:"medium",dr:[2,0,4,0,0],sh:[0,1,3,2,4,3,0,3],why:"Modello canadese/australiano. Selezione per competenze riduce mismatch (48%). Impatto PIL: +0.2pp se ben calibrato (OECD). Trade-off: tempi integrazione, costi formativi."},
  {id:"police_merge",c:"governance",n:"Integrazione forze ordine",de:"5 corpi → 2 (Polizia + Carabinieri)",co:-3,sp:"slow",cx:18,cf:"medium",dr:[0,0,0,0,6],sh:[-2,-7,-1,1,1,2,-6,4],why:"5 forze (Polizia, CC, GdF, Penitenziaria, Forestale): sovrapposizioni, 330K effettivi. Olanda ha unificato: -15% costi, +20% efficacia operativa."},

  {id:"no_milleproroghe",c:"giustizia",n:"Abolizione decreto milleproroghe",de:"Divieto costituzionale di proroghe: ogni scadenza è definitiva",co:-0.5,sp:"medium",cx:12,cf:"medium",dr:[0,3,0,0,2],sh:[0,-3,2,3,4,5,-2,5],why:"Milleproroghe annuale: 50-100 proroghe ogni dicembre. Concessioni autostradali, scadenze PA, norme transitorie → diventano permanenti. Proposta: divieto costituzionale di proroghe per legge. Ogni scadenza è definitiva. Se serve più tempo: nuova legge con dibattito parlamentare (non articolo nascosto in omnibus). Effetto: certezza del diritto, fine dei rinvii perpetui."},

  {id:"leva_civile",c:"difesa",n:"Servizio civile/militare universale",de:"6 mesi obbligatori (18-21 anni): militare, sanitario, ambientale o sociale a scelta",co:4,sp:"slow",cx:16,cf:"exploratory",dr:[0,0,2,0,1],sh:[3,4,-2,-5,0,1,3,0],why:"Leva abolita 2004. Proposta: 6 mesi obbligatori universali (M+F) con 4 percorsi: (1) militare (reparti operativi), (2) sanitario (ospedali, RSA), (3) ambientale (protezione civile, parchi), (4) sociale (scuole, comunità). 500K giovani/anno × 800€/mese = 2.4 Mrd + 1.6 Mrd infrastrutture. Effetti: coesione sociale, competenze trasversali, riserva operativa. Svezia: reintrodotta 2017. Svizzera: mai abolita. Francia: SNU (Service National Universel) dal 2019. Trade-off: costo elevato, impatto su ingresso mercato lavoro, obiezione di coscienza."},
  {id:"voucher_lavoro",c:"lavoro",n:"Voucher lavoro riformati",de:"Voucher digitali tracciabili per lavoro occasionale <5K€/anno",co:0,sp:"fast",cx:4,cf:"high",dr:[0,0,2,0,0],sh:[1,1,4,3,4,2,2,2],why:"Lavoro nero occasionale: 3.3M lavoratori irregolari (ISTAT). Vecchi voucher aboliti 2017 per abuso. Proposta: voucher digitali via app IO, tracciati, max 5K€/anno per committente, contributi INPS automatici 13%. Settori: agricoltura, turismo, domestico, eventi. Belgio: système titres-services, 150K lavoratori regolarizzati. Emersione stimata: 500K lavoratori, +2 Mrd contributi."},
  {id:"ispettori_lavoro",c:"lavoro",n:"Piano 10K ispettori del lavoro",de:"Da 4.500 a 14.500 ispettori + AI targeting aziende a rischio",co:1.5,sp:"medium",cx:8,cf:"high",dr:[0,1,2,0,0],sh:[-1,1,4,3,-4,2,3,4],why:"4.500 ispettori per 5M aziende = 1 ispezione ogni 20 anni per azienda (FR: ogni 7 anni, UK: ogni 10). 60% irregolarità trovata nelle ispezioni fatte. Proposta: +10K ispettori + AI risk scoring (targeting aziende per settore, zona, segnalazioni). Costo: 1.5 Mrd. Recupero contributi evasi: 3-4 Mrd/anno. ROI: 2× in 2 anni. Risultato UK HMRC: targeted inspections +200% efficacia."},
  {id:"deduzione_domestici",c:"mef",n:"Deduzione 100% lavoro domestico",de:"Colf, badanti, babysitter: deduzione totale per il datore di lavoro famiglia",co:2,sp:"fast",cx:3,cf:"high",dr:[0,0,2,0,0],sh:[3,2,5,4,1,0,3,0],why:"2M collaboratori domestici, 57% irregolari (DOMINA/INPS). Costo regolare: 12-15K€/anno (contributi + TFR + ferie). Proposta: deduzione fiscale 100% dei costi (oggi solo contributi parziali). Costo Stato: 2 Mrd minor gettito IRPEF. Emersione stimata: 600K irregolari. Nuovi contributi INPS: 2.5 Mrd. Effetto netto: +500M€. Francia: Chèque Emploi Service, ha regolarizzato 2M lavoratori."},

  {id:"giudice_mono",c:"giustizia",n:"Giudice monocratico per cause <25K€",de:"1 giudice, procedura semplificata, sentenza in 90 giorni max",co:0,sp:"medium",cx:6,cf:"high",dr:[0,4,0,0,0],sh:[1,2,3,3,4,4,0,4],why:"65% delle cause civili è sotto 25K€ (affitti, condominio, sinistri, bollette). Oggi: stessa procedura di una causa da 10M€. Proposta: giudice unico (no collegio), udienza unica, istruttoria scritta, sentenza in 90gg. UK Small Claims Court: 30gg, 95% soddisfazione. Effetto: libera 40% del carico tribunali, −2M cause/anno dalla procedura ordinaria."},

  {id:"fer_14mrd",c:"energia",n:"Piano FER 14 Mrd: solare + accumuli + idro",de:"6 Mrd fotovoltaico (12 GW), 4 Mrd batterie (20 GWh), 3 Mrd pompaggio idro, 1 Mrd rete",co:14,sp:"medium",cx:8,cf:"high",dr:[3,4,0,8,0],sh:[2,3,3,5,4,5,0,4],why:"14 Mrd in 3 anni. Allocazione ottimale dato il mix IT (40% gas, 20% FER): (1) SOLARE 6 Mrd → 12 GW utility-scale a 0.50€/W, genera 18 TWh/anno, LCOE 25-30€/MWh (più basso di qualsiasi fonte). Priorità: agrivoltaico Mezzogiorno (irradiazione 1.800 kWh/mq). (2) BATTERIE 4 Mrd → 20 GWh elettrochimiche (Li-ion, 200€/kWh in calo). Servono per bilanciare intermittenza solare. TERNA stima fabbisogno 50 GWh al 2030. (3) POMPAGGIO IDROELETTRICO 3 Mrd → 3 GW/15 GWh. Storage di lunga durata (8-12h vs 4h batterie). Siti: Alpi (ampliamento esistenti), Sardegna (nuovi). Complementare alle batterie: batterie per intraday, pompaggio per overnight/settimanale. (4) RETE 1 Mrd → accelerazione Tyrrhenian Link + rinforzo dorsale Nord-Sud (collo di bottiglia 3 GW vs 8 necessari). Senza rete, il solare del Sud non raggiunge il Nord. Effetto aggregato: PUN -20€/MWh, import gas -15%, CO2 -18Mt/anno, 120K posti lavoro in costruzione. ROI: costo evitato gas 3-4 Mrd/anno → payback 4-5 anni. Idroelettrico classico NON incluso: Italia ha già 22 GW, quasi saturo. Espansione marginale (mini-hydro) non cost-effective vs solare."},

// ── IRPEF Microsimulation ───────────────────────────────────────────
function irpefCr(i){if(i<=15000)return 1880;if(i>=50000)return 0;return Math.round(1880*(1-(i-15000)/35000));}
function irpefTx(i,bks){let t=0,p=0;for(const b of bks){const x=Math.min(i,b.t)-p;if(x>0)t+=x*(b.r/100);p=b.t;if(i<=b.t)break;}return Math.max(0,t-irpefCr(i));}
function irpefRev(bks){let t=0,d=[];for(const[i,n,l]of IDIST){const tx=irpefTx(i,bks);t+=tx*n/1e6;d.push({l,i:i,n,tx,ef:i>0?Math.round(tx/i*1000)/10:0});}return{t:Math.round(t*10)/10,d};}
function irpefMg(i,bks){for(const b of bks)if(i<=b.t)return b.r;return bks[bks.length-1]?.r||0;}
function irpefBv(oB,nB){const E=CF.eti;let m=0,b=0;for(const[i,n]of IDIST){m+=(irpefTx(i,nB)-irpefTx(i,oB))*n/1e6;const oM=irpefMg(i,oB),nM=irpefMg(i,nB);if(nM!==oM&&nM>0)b+=E*(Math.log((100-nM)/100)-Math.log((100-oM)/100))*i*(nM/100)*n/1e6;}return{m:Math.round(m*10)/10,b:Math.round(b*10)/10,n:Math.round((m+b)*10)/10};}

// Compute IRPEF_BASE and fill GOV_REV slots (deferred from LAYER 0)

// ── IRPEF Multi-Year Projection with Bracket Creep ──────────────────
// Bracket creep: if thresholds aren't indexed to inflation, nominal income
// growth pushes taxpayers into higher brackets → automatic revenue increase
function irpefMultiYear(bks,years){
  const inf=B.inf/100,wageG=inf+B.pot/100; // nominal wage growth ≈ inflation + productivity
  const results=[];
  for(const yr of years){
    // Income distribution grows nominally but brackets stay fixed → creep
    const scaledIDIST=IDIST.map(([inc,n,l])=>[Math.round(inc*Math.pow(1+wageG,yr)),n,l]);
    let rev=0;for(const[i,n]of scaledIDIST)rev+=irpefTx(i,bks)*n/1e6;
    const baseRev=irpefRev(bks).t; // Y0 static
    const creepGain=Math.round((rev-baseRev)*10)/10;
    // Behavioral response at different ETI levels
    const bvLow=irpefBv(IRPEF_CUR,bks); // use central for base
    results.push({yr,rev:Math.round(rev*10)/10,creep:creepGain,
      dNet:Math.round((rev-IRPEF_BASE)*10)/10});
  }
  return results;
}

function irpefETISens(oB,nB){

  return{low:calc(0.12),mid:calc(CF.eti),high:calc(0.40)};
}

function plYear(yr,real){
  const df=real?Math.pow(1+B.inf/100,-(yr-2025)):1;let rv,cv,iv;
  if(yr<=2024&&HIST[yr]){const h=HIST[yr],rr=h.r/B.revenue,cr=h.opx/OPEX_TOTAL;
    rv=GOV_REV.map(([,v])=>Math.round(v*rr*df));cv=GOV_COST.map(([,v])=>Math.round(v*cr*df));iv=Math.round(h.i*df);
  }else if(yr===2025){rv=GOV_REV.map(([,v])=>Math.round(v*df));cv=GOV_COST.map(([,v])=>Math.round(v*df));iv=Math.round(B.interest*df);
  }else{const dy=yr-2025,ng=Math.pow(1+(B.pot+B.inf)/100,dy);
    rv=GOV_REV.map(([,v,g])=>Math.round(v*ng*Math.pow(g||1,dy)*df));cv=GOV_COST.map(([,v,g])=>Math.round(v*ng*Math.pow(g||1,dy)*df));iv=Math.round(B.interest*Math.pow(1.025,dy)*df);}
  const gRaw=yr<=2024&&HIST[yr]?HIST[yr].g:yr===2025?B.gdp:B.gdp*Math.pow(1+(B.pot+B.inf)/100,yr-2025);
  const rt=rv.reduce((s,v)=>s+v,0),ct=cv.reduce((s,v)=>s+v,0);
  return{yr,gdp:Math.round(gRaw*df),rv,cv,rt,ct,int:iv,ebit:rt-ct,net:rt-ct-iv};}

function computeOverrides(mod){
  const o={};
  const iv=irpefBv(IRPEF_CUR,mod.irpef);if(iv.n!==0)o.irpef={co:iv.n>0?-iv.n:Math.abs(iv.n),rv:1};
  const pR=calcPatri(mod.patri[0],mod.patri[1]);if(pR>0)o.patrimoniale={co:-pR,rv:1};
  const cD=calcComuni(mod.comuni);if(cD.sav>0)o.comuni={co:-cD.sav};
  const pD=calcPens(mod.pens.age,mod.pens.sist);if(pD.sav>0)o.pensioni={co:-pD.sav,dr:[0,0,pD.dr,0,0]};
  const sT=calcSpend(mod.spend);if(sT>0)o.spending={co:-sT};
  const pP=calcPart(mod.part);if(pP.v>0)o.inhouse={co:-pP.v};

  return o;
}

function analyzeProposal(txt){
  if(!txt||txt.length<3)return null;
  const low=txt.toLowerCase();
  // Find best keyword match
  let best=null,bestScore=0;
  for(const entry of KW){
    const score=entry.kw.filter(k=>low.includes(k)).length;
    if(score>bestScore){bestScore=score;best=entry;}
  }
  if(!best)return{error:"Nessuna politica riconosciuta. Prova con termini come: IRPEF, pensioni, spending review, rinnovabili, giustizia, sanità..."};
  const pol=PP.find(p=>p.id===best.id);
  if(!pol)return{error:"Politica non trovata nel catalogo."};
  // Extract cost from text
  const numMatch=low.match(/(\d+[\.,]?\d*)\s*(miliard|mrd|bln)/);
  const mlnMatch=low.match(/(\d+[\.,]?\d*)\s*(milion|mln)/);
  let extractedCost=numMatch?parseFloat(numMatch[1].replace(",",".")):mlnMatch?parseFloat(mlnMatch[1].replace(",","."))/1000:null;
  // Fiscal-semantic cost sign
  const isTag=/(riduz|tagli|eliminaz|aboliz|spending|razional)/i.test(txt);
  const isAum=/(aument|nuov|introduz|piano|investim|potenzi)/i.test(txt);
  const pensDown=/(riduz|abbass|anticip).*(?:età|pension|ritiro)/i.test(txt)||/(?:età|pension|ritiro).*(?:riduz|abbass|anticip)/i.test(txt);
  const pensUp=/(aument|innalz|posticip).*(?:età|pension|ritiro)/i.test(txt)||/(?:età|pension|ritiro).*(?:aument|innalz|posticip)/i.test(txt);
  let costo=extractedCost!==null?extractedCost:Math.abs(pol.co);
  if(pensDown&&costo<0)costo=Math.abs(costo);
  else if(pensUp&&costo>0)costo=-Math.abs(costo);
  else if(!pensDown&&!pensUp){if(isTag&&costo>0)costo=-Math.abs(costo);if(isAum&&costo<0)costo=Math.abs(costo);}
  // Simulate impact
  try{
    const po={[pol.id]:{co:costo}};
    const result=sim([pol.id],SC.base,0,[],po);
    const y5=result.years[4];
    return{pol,costo:r1(costo),y5,match:bestScore,drivers:pol.dr.map((d,i)=>d>0?DRV[i].n:null).filter(Boolean)};
  }catch(e){return{pol,costo:r1(costo),match:bestScore,drivers:[]};}
}

function useEngine(sel,mod,shk,frI){
  const po=useMemo(()=>computeOverrides(mod),[mod]);
  const lv=useMemo(()=>sel.length?simAll(sel,frI,shk,po):null,[sel,frI,shk,po]);
  const preview=lv?.base?.years?.[4];
  const ep=useMemo(()=>PP.map(p=>po[p.id]?{...p,...po[p.id]}:p),[po]);
  const selP=useMemo(()=>ep.filter(p=>sel.includes(p.id)),[ep,sel]);
  const spent=selP.filter(p=>p.co>0).reduce((s,p)=>s+p.co,0);
  const saved=selP.filter(p=>p.co<0).reduce((s,p)=>s+Math.abs(p.co),0)*SC.base.sv;
  return{po,lv,preview,ep,selP,spent,saved,net:r1(spent-saved),tCx:selP.reduce((s,p)=>s+p.cx,0)};
}
function useDashboard(range,real,accrual){
  return useMemo(()=>{const yrs=[];const DEPR=22;for(let y=range[0];y<=range[1];y++){const p=plYear(y,real);if(accrual){const af=1.025,cf=1.04;p.rv=p.rv.map(v=>Math.round(v*af));p.cv=p.cv.map(v=>Math.round(v*cf));p.cv[p.cv.length-1]+=DEPR;p.rt=p.rv.reduce((s,v)=>s+v,0);p.ct=p.cv.reduce((s,v)=>s+v,0);p.int=Math.round(p.int*1.01);p.ebit=p.rt-p.ct;p.net=p.ebit-p.int;}yrs.push(p);}return yrs;},[range[0],range[1],real,accrual]);
}

            ["Spread BTP-Bund",`${B.spr}`,"bp",B.spr>150?$.rd:$.fg,"Costo rischio Italia"],["Occupati",`${B.occ}M`,"",$.fg,"Su 60M abitanti"],["Disoccupazione",`${B.ue}%`,"",B.ue>8?$.rd:$.am,"Media annua"],

            ["PUN elettrico",`${B.pun}`,"€/MWh",B.pun>100?$.am:$.fg,"+30€ vs media EU"],["Crescita salari",`+${B.salG}%`,"",B.salG<2?$.rd:$.fg,"Reale, annua"],["Crescita potenziale",`+${B.pot}%`,"",B.pot<1?$.rd:$.fg,"Ultima tra G7"]

        <div style={{...srf,padding:mob?"14px":"18px 20px",marginBottom:16}}><div style={{fontSize:mob?12:14,fontWeight:600,marginBottom:12}}>Italia vs Europa <span style={{fontSize:9,color:$.f3}}>({EU_YEAR})</span></div>

        {/* Structural Diagnosis */}
        <div style={{...srf,padding:"18px 20px",marginBottom:16}}>

                <tr style={{borderTop:`1.5px solid ${$.rd}`,background:"rgba(204,51,64,.02)"}}><td style={{padding:"5px 6px",fontWeight:700,color:$.rd,fontSize:11,...stk,background:"rgba(204,51,64,.04)"}}>TOTALE USCITE OP.</td>
                  {dashYears.map(y=><td key={y.yr} style={{padding:"5px 3px",textAlign:"right",fontWeight:700,color:$.rd}}>{y.ct}</td>)}</tr>

              </tbody></table></div>
          <div style={{height:140,marginBottom:8}}><ResponsiveContainer><LineChart data={dashYears} margin={{top:4,right:4,left:-8,bottom:0}}>

        <button onClick={()=>setScr(2)} style={{width:"100%",fontSize:15,fontWeight:600,padding:"16px",borderRadius:$.rs,background:$.fg,color:"#fff",border:"none",cursor:"pointer",boxShadow:$.sm}}>Costruisci il tuo piano →</button>
      </div>)}

      {/* TROUBLESHOOTING — DIAGNOSI */}
      {scr===1&&(()=>{const prob=PROBS.find(p=>p.id===probSel)||PROBS[0];const cumul=[];let acc=0;prob.pareto.forEach(([,s])=>{acc+=s;cumul.push(acc);});

            <div style={{fontSize:9,fontFamily:$.mo,color:$.am,marginTop:6}}>→ L'{Math.round(prob.pareto.filter((_,i)=>cumul[i]<=80).reduce((s,p)=>s+p[1],0))}% del problema è concentrato in {prob.pareto.filter((_,i)=>cumul[i]<=80).length} cause.</div>
          </div>
          {/* SVG Map of Italy */}
          {REG_DATA[prob.id]&&(()=>{const rd=REG_DATA[prob.id],vals=rd.v,mn=Math.min(...vals),mx=Math.max(...vals);
            return (<div style={{...srf,padding:"18px 20px",marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}><div style={{fontSize:13,fontWeight:600}}>Mappa regionale — {rd.n}</div>
                <div style={{display:"flex",gap:4,alignItems:"center",fontSize:8,fontFamily:$.mo}}><span style={{width:8,height:8,borderRadius:4,background:$.gn,display:"inline-block"}}/><span style={{color:$.f3}}>Migliore</span><span style={{width:8,height:8,borderRadius:4,background:$.rd,display:"inline-block",marginLeft:6}}/><span style={{color:$.f3}}>Peggiore</span></div></div>
              <div style={{width:"100%",maxWidth:340,margin:"8px auto"}}>
                <svg viewBox="0 0 100 98" style={{width:"100%",display:"block",background:"#fff",borderRadius:8,border:`1px solid ${$.br}`}}>
                  {(()=>{const rd=REG_DATA[prob.id],vals=rd.v,mn=Math.min(...vals),mx=Math.max(...vals);

                      return (<g key={rg}>
                        <path d={RP[rg]} fill={`rgb(${r},${g},${b})`} fillOpacity={0.7} stroke="#888" strokeWidth={0.3}/>
                        <text x={cx} y={cy+0.5} textAnchor="middle" fontSize={2.8} fill="#333" fontWeight="600" fontFamily="sans-serif">{RN[i]}</text>
                        <text x={cx} y={cy+3.5} textAnchor="middle" fontSize={2.5} fill="#555" fontWeight="bold" fontFamily="monospace">{v}{rd.u==="%"?"%":rd.u==="K€"?"K":rd.u==="gg"?"gg":""}</text>
